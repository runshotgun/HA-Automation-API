configuration:
  allow_list:
    name: Allow listing automations and scripts
    description: Enable GET /automations and GET /scripts to return metadata.
  allow_read:
    name: Allow reading a single automation or script
    description: Enable GET /automations/{id} and GET /scripts/{id}.
  allow_search:
    name: Allow searching automations and scripts
    description: Enable GET /automations/search and GET /scripts/search.
  allow_edit:
    name: Allow editing automations and scripts
    description: Enable PUT/PATCH for /automations/{id} and /scripts/{id}.
  allow_delete:
    name: Allow deleting automations and scripts
    description: Enable DELETE for /automations/{id} and /scripts/{id}.
  allowed_ips:
    name: Allowed IP addresses
    description: |
      Only requests from these IP addresses can call the API.
      Example values: 192.168.1.10, 192.168.1.25.
      Empty list means no clients are allowed.
  automations_file:
    name: Automations YAML path
    description: Path to the automations YAML file inside Home Assistant.
  scripts_file:
    name: Scripts YAML path
    description: Path to the scripts YAML file inside Home Assistant.
  backup_keep:
    name: Backup retention count
    description: Number of timestamped automation/script backups to keep per file.
  home_assistant_url:
    name: Home Assistant URL
    description: Base URL used for token validation and automation/script reload calls.
